<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Dudo Pro - Corrección de Ases</title>
    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #10b981;
            --accent-hover: #059669;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --border-color: #334155;
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --accent-color: #059669;
            --accent-hover: #047857;
            --danger-color: #dc2626;
            --warning-color: #d97706;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            padding: 24px;
            border: 1px solid var(--border-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            background-color: var(--border-color);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            margin-top: 16px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 13px;
            color: var(--text-muted);
        }

        input, select {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        /* Selector de Dados Estilizado con CSS */
        .dice-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-bottom: 16px;
        }

        .dice-btn {
            background-color: var(--bg-color);
            border: 2px solid var(--border-color);
            border-radius: 10px;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            padding: 6px;
            transition: all 0.2s;
        }

        .dice-btn:hover {
            border-color: var(--text-muted);
        }

        .dice-btn.active {
            border-color: var(--accent-color);
            background-color: rgba(16, 185, 129, 0.1);
        }

        /* Estructura interna del dado CSS */
        .dice {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 2px;
        }

        .dot {
            background-color: var(--text-color);
            border-radius: 50%;
            width: 100%;
            height: 100%;
            max-width: 6px;
            max-height: 6px;
            margin: auto;
        }

        .dice-btn.active .dot {
            background-color: var(--accent-color);
        }

        /* Posiciones específicas para los puntos de los dados */
        .d1 .dot:nth-child(1) { grid-area: 2 / 2; }
        
        .d2 .dot:nth-child(1) { grid-area: 1 / 1; }
        .d2 .dot:nth-child(2) { grid-area: 3 / 3; }
        
        .d3 .dot:nth-child(1) { grid-area: 1 / 1; }
        .d3 .dot:nth-child(2) { grid-area: 2 / 2; }
        .d3 .dot:nth-child(3) { grid-area: 3 / 3; }
        
        .d4 .dot:nth-child(1) { grid-area: 1 / 1; }
        .d4 .dot:nth-child(2) { grid-area: 1 / 3; }
        .d4 .dot:nth-child(3) { grid-area: 3 / 1; }
        .d4 .dot:nth-child(4) { grid-area: 3 / 3; }
        
        .d5 .dot:nth-child(1) { grid-area: 1 / 1; }
        .d5 .dot:nth-child(2) { grid-area: 1 / 3; }
        .d5 .dot:nth-child(3) { grid-area: 2 / 2; }
        .d5 .dot:nth-child(4) { grid-area: 3 / 1; }
        .d5 .dot:nth-child(5) { grid-area: 3 / 3; }
        
        .d6 .dot:nth-child(1) { grid-area: 1 / 1; }
        .d6 .dot:nth-child(2) { grid-area: 1 / 3; }
        .d6 .dot:nth-child(3) { grid-area: 2 / 1; }
        .d6 .dot:nth-child(4) { grid-area: 2 / 3; }
        .d6 .dot:nth-child(5) { grid-area: 3 / 1; }
        .d6 .dot:nth-child(6) { grid-area: 3 / 3; }

        /* Panel de Resultados y Probabilidad */
        .result-panel {
            background-color: var(--bg-color);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-color);
            margin-top: 20px;
            text-align: center;
        }

        .probability-display {
            font-size: 36px;
            font-weight: 800;
            margin: 8px 0;
            color: var(--accent-color);
        }

        .progress-container {
            background-color: var(--border-color);
            border-radius: 8px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            transition: width 0.3s, background-color 0.3s;
        }

        .helper-text {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Tabla de respuestas posibles corregida */
        .responses-box {
            margin-top: 16px;
            background-color: var(--bg-color);
            border-radius: 8px;
            padding: 12px;
            border: 1px solid var(--border-color);
        }

        .response-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        [data-theme="light"] .response-row {
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .response-row:last-child {
            border-bottom: none;
        }

        .badge {
            background-color: var(--border-color);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
        }

        .alert-box {
            background-color: rgba(245, 158, 11, 0.1);
            border-left: 4px solid var(--warning-color);
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎲 Calculadora de Dudo Pro</h1>
        <button class="theme-toggle" id="themeBtn">Modo Claro</button>
    </div>

    <!-- Alerta informativa de reglas de cambio -->
    <div class="alert-box" id="ruleAlert">
        ⚠️ <strong>Regla Activa:</strong> Saliendo de Ases. El mínimo para volver a pinta normal es <strong>(Ases × 2) + 1</strong>.
    </div>

    <div class="grid-2">
        <div class="input-group">
            <label for="totalDice">Total dados en mesa</label>
            <input type="number" id="totalDice" value="20" min="1" max="50">
        </div>
        <div class="input-group">
            <label for="ownDice">Tus dados totales</label>
            <input type="number" id="ownDice" value="5" min="0" max="5">
        </div>
    </div>

    <div class="section-title">Tu Mano (Cuántos tienes de la jugada)</div>
    <div class="input-group" style="margin-bottom: 16px;">
        <label for="myMatches">Dados tuyos que sirven para la apuesta (incluye tus Ases si aplica):</label>
        <input type="number" id="myMatches" value="2" min="0" max="5">
    </div>

    <div class="section-title">Jugada Actual del Rival</div>
    <div class="grid-2">
        <div class="input-group">
            <label for="currentQty">Cantidad cantada</label>
            <input type="number" id="currentQty" value="4" min="1">
        </div>
        <div class="input-group">
            <label>Cara del dado</label>
            <div class="dice-grid">
                <button class="dice-btn" data-face="1">
                    <div class="dice d1"><div class="dot"></div></div>
                </button>
                <button class="dice-btn" data-face="2">
                    <div class="dice d2"><div class="dot"></div><div class="dot"></div></div>
                </button>
                <button class="dice-btn" data-face="3">
                    <div class="dice d3"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </button>
                <button class="dice-btn" data-face="4">
                    <div class="dice d4"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </button>
                <button class="dice-btn" data-face="5">
                    <div class="dice d5"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </button>
                <button class="dice-btn" data-face="6">
                    <div class="dice d6"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </button>
            </div>
        </div>
    </div>

    <div class="result-panel">
        <div class="helper-text" id="playDescription">Probabilidad de que la jugada sea REAL:</div>
        <div class="probability-display" id="probText">--%</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="helper-text" id="adviceText">Cargando análisis...</div>
    </div>

    <div class="section-title">Mínimos Permitidos para tu Respuesta</div>
    <div class="responses-box" id="nextPlaysBox">
        <!-- Generado dinámicamente -->
    </div>
</div>

<script>
    // Estado de la app
    const state = {
        theme: 'dark',
        currentFace: 1 // Empezamos en 1 (Ases) para demostrar la corrección del usuario
    };

    // Combinatoria para distribución binomial
    function nCr(n, r) {
        if (r < 0 || r > n) return 0;
        if (r === 0 || r === n) return 1;
        if (r > n / 2) r = n - r;
        let res = 1;
        for (let i = 1; i <= r; i++) {
            res = res * (n - i + 1) / i;
        }
        return res;
    }

    // Calcular probabilidad binomial acumulada
    function calculateBinomial(totalMesa, misDados, misDadosUtiles, cantCantada, cara) {
        const dadosOcultos = totalMesa - misDados;
        const faltantes = cantCantada - misDadosUtiles;

        if (faltantes <= 0) return 100; // Ya se cumple con lo que tengo en mano
        if (dadosOcultos < faltantes) return 0; // Es físicamente imposible que existan suficientes dados

        // Probabilidad de éxito por cada dado oculto
        // Si se cantan Ases (1), la prob es 1/6. Si es cualquier otra pinta, es 2/6 (la pinta + el as comodín)
        const p = (cara === 1) ? (1 / 6) : (2 / 6);
        
        let sumaProb = 0;
        for (let k = faltantes; k <= dadosOcultos; k++) {
            sumaProb += nCr(dadosOcultos, k) * Math.pow(p, k) * Math.pow(1 - p, dadosOcultos - k);
        }

        return Math.min(100, Math.max(0, sumaProb * 100));
    }

    function updateUI() {
        const totalDice = parseInt(document.getElementById('totalDice').value) || 0;
        const ownDice = parseInt(document.getElementById('ownDice').value) || 0;
        const myMatches = parseInt(document.getElementById('myMatches').value) || 0;
        const currentQty = parseInt(document.getElementById('currentQty').value) || 1;
        const face = state.currentFace;

        // Validar topes lógicos de inputs
        if(myMatches > ownDice) {
            document.getElementById('myMatches').value = ownDice;
        }

        // 1. Calcular Probabilidad de la jugada actual
        const prob = calculateBinomial(totalDice, ownDice, myMatches, currentQty, face);
        
        // Actualizar vista de probabilidad
        const probText = document.getElementById('probText');
        const progressBar = document.getElementById('progressBar');
        probText.innerText = prob.toFixed(1) + '%';
        progressBar.style.width = prob + '%';

        // Cambiar color según riesgo
        if (prob > 70) {
            probText.style.color = 'var(--accent-color)';
            progressBar.style.background = 'var(--accent-color)';
            document.getElementById('adviceText').innerText = "⚠️ Alta probabilidad. No te conviene dudarle todavía.";
        } else if (prob > 40) {
            probText.style.color = 'var(--warning-color)';
            progressBar.style.background = 'var(--warning-color)';
            document.getElementById('adviceText').innerText = "⚖️ Zona gris. El rival podría estar diciendo la verdad justa.";
        } else {
            probText.style.color = 'var(--danger-color)';
            progressBar.style.background = 'var(--danger-color)';
            document.getElementById('adviceText').innerText = "🔥 ¡Baja probabilidad! Excelente momento para cantar ¡DUDO!.";
        }

        // Label descriptivo
        const nombresPintas = {1: 'Ases', 2: 'Doses', 3: 'Treces', 4: 'Cuadras', 5: 'Quinas', 6: 'Sextas'};
        document.getElementById('playDescription').innerText = `Probabilidad de que existan ${currentQty} ${nombresPintas[face]} en total:`;

        // 2. CORRECCIÓN CRÍTICA DE REGLAS: Calcular las respuestas válidas siguientes
        const nextPlaysBox = document.getElementById('nextPlaysBox');
        nextPlaysBox.innerHTML = '';

        const alertBox = document.getElementById('ruleAlert');
        
        if (face === 1) {
            // SI LA JUGADA ACTUAL ES ASES (Tu caso reportado: 4 o 5 ases)
            alertBox.style.display = 'block';
            
            for (let f = 1; f <= 6; f++) {
                let minQty = 0;
                if (f === 1) {
                    // Para seguir en ases, solo debes incrementar en 1
                    minQty = currentQty + 1;
                } else {
                    // REGLA OFICIAL DEL DUDO: Para salir de Ases a una pinta normal, es el (Doble de Ases) + 1
                    minQty = (currentQty * 2) + 1;
                }

                const row = document.createElement('div');
                row.className = 'response-row';
                row.innerHTML = `<span>Mínimo para responder con <strong>${nombresPintas[f]}</strong>:</span> <span class="badge">${minQty} dados</span>`;
                nextPlaysBox.appendChild(row);
            }
        } else {
            // SI LA JUGADA ACTUAL ES NORMAL (2-6)
            alertBox.style.display = 'none';
            
            for (let f = 1; f <= 6; f++) {
                let minQty = 0;
                if (f === 1) {
                    // Para bajar a Ases, es la mitad redondeada hacia arriba
                    minQty = Math.ceil(currentQty / 2);
                } else if (f > face) {
                    // Si subes la pinta, puedes mantener la misma cantidad
                    minQty = currentQty;
                } else {
                    // Si mantienes la pinta o bajas la pinta, debes subir la cantidad en 1
                    minQty = currentQty + 1;
                }

                const row = document.createElement('div');
                row.className = 'response-row';
                row.innerHTML = `<span>Mínimo para responder con <strong>${nombresPintas[f]}</strong>:</span> <span class="badge">${minQty} dados</span>`;
                nextPlaysBox.appendChild(row);
            }
        }
    }

    // Manejo de clicks en los dados CSS
    document.querySelectorAll('.dice-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.dice-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            state.currentFace = parseInt(this.getAttribute('data-face'));
            updateUI();
        });
    });

    // Inputs dinámicos
    document.getElementById('totalDice').addEventListener('input', updateUI);
    document.getElementById('ownDice').addEventListener('input', function() {
        const val = parseInt(this.value) || 0;
        document.getElementById('myMatches').max = val;
        updateUI();
    });
    document.getElementById('myMatches').addEventListener('input', updateUI);
    document.getElementById('currentQty').addEventListener('input', updateUI);

    // Toggle de modo claro/oscuro
    document.getElementById('themeBtn').addEventListener('click', function() {
        if (state.theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'light');
            this.innerText = 'Modo Oscuro';
            state.theme = 'light';
        } else {
            document.documentElement.removeAttribute('data-theme');
            this.innerText = 'Modo Claro';
            state.theme = 'dark';
        }
    });

    // Inicializar app marcando el As (1) como activo
    document.querySelector('.dice-btn[data-face="1"]').classList.add('active');
    updateUI();
</script>

</body>
</html>
